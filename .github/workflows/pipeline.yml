name: My First DevOps Pipeline
 
on:
  push:
    branches: [ main ]
 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Step 1 - Get the code
        uses: actions/checkout@v3
 
      - name: Step 2 - Show which files exist
        run: ls -la
 
      - name: Step 3 - Run a simple test
        run: echo 'All tests passed! Build is healthy.'
 
      - name: Step 4 - Show success message
        run: echo 'Pipeline complete - ready to deploy!'

